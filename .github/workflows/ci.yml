name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  test:
    name: Import & smoke test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install Pillow numpy torch --index-url https://download.pytorch.org/whl/cpu

      - name: Import node
        run: python -c "from image_compress import NODE_CLASS_MAPPINGS, NODE_DISPLAY_NAME_MAPPINGS; print('OK:', list(NODE_CLASS_MAPPINGS.keys()))"

      - name: Smoke test compression
        run: |
          python - <<'EOF'
          import torch
          from image_compress import NODE_CLASS_MAPPINGS

          node = NODE_CLASS_MAPPINGS["ImageCompress"]()

          # Create a dummy 64x64 RGB image tensor (batch=1)
          img = torch.rand(1, 64, 64, 3)

          for fmt in ("JPEG", "PNG"):
              for quality in (1, 50, 100):
                  for scale in (100, 50):
                      out_img, report = node.compress(img, quality=quality, scale_percent=scale, format=fmt)
                      assert out_img.ndim == 4, "Output must be 4D (B,H,W,C)"
                      assert out_img.shape[0] == 1, "Batch size must be preserved"
                      assert "Compressed size" in report, "Report must contain size info"
                      print(f"  PASS  format={fmt}  quality={quality}  scale={scale}  out_shape={tuple(out_img.shape)}")

          print("\nAll smoke tests passed.")
          EOF
